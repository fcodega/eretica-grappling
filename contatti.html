        /* Stile specifico per questa pagina */
        .contact-info h3 {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;

        .contact-info p, .contact-info a.main-link {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: block;
            color: var(--fg);
            text-decoration: none;
            line-height: 1.2;
        }

        .contact-info a.main-link:hover {
            color: var(--accent);
        }

        /* Il trucco per fare la mappa in Dark Mode */
        .map-container {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: 1px solid var(--border);
            /* Inverte i colori di Google Maps per farli fondere col sito scuro */
            filter: invert(90%) hue-rotate(180deg) contrast(100%); 
        }

        /* Stile Custom per i Quadrati Social (IG e WA) */
        .btn-square {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px; /* Dimensione del quadrato */
            height: 80px;
            overflow: hidden;
            border: 2px solid var(--border);
            transition: border-color 0.3s ease;
            background-color: var(--bg);
            margin-bottom: 2rem; /* Aggiunto per distanziare bene i titoli sotto */
        }

        .btn-square:hover {
            border-color: var(--accent);
        }
        
        /* Gestione SVG per i loghi */
        .btn-square svg {
            width: 35px; /* Grandezza perfetta dentro il quadrato */
            height: 35px;
            fill: var(--fg); /* Colore bianco di default */
            transition: fill 0.3s ease;
        }
        
        .btn-square:hover svg {
            fill: var(--accent); /* Diventa rosso al passaggio del mouse */
        }
    </style>
